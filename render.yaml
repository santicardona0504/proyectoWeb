services:
  - type: web
    name: biblioteca
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node scripts/startup.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: biblioteca-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: biblioteca-db
    databaseName: library
    plan: free
