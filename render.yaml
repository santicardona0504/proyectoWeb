
# ═══════════════════════════════════════════════════════════════
# Render Blueprint — Sistema Biblioteca
# Servicios: Frontend Angular + Backend Node.js + PostgreSQL
# ═══════════════════════════════════════════════════════════════

services:

  # ─── Backend API (Node.js + Express 5) ─────────────────────
  - type: web
    name: biblioteca-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/startup.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Conexión a PostgreSQL (Render inyecta automáticamente)
      - key: DATABASE_URL
        fromDatabase:
          name: biblioteca-db
          property: connectionString

      # ⚠️ CAMBIAR: Usá valores FIJOS en Render Dashboard
      #             Si usás generateValue, las sesiones expiran en cada deploy
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true

      # URL del frontend para CORS (se completa automáticamente en Render)
      - key: CORS_ORIGIN
        sync: false

      # ⚠️ CAMBIAR: Contraseña segura para admin@biblioteca.com
      - key: ADMIN_PASSWORD
        sync: false

  # ─── Frontend Angular (Static Site) ───────────────────────
  - type: static
    name: biblioteca-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist/frontend/browser
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # URL del backend API (ej: https://biblioteca-api.onrender.com)
      # Se inyecta en environment.prod.ts durante el build
      - key: API_URL
        sync: false

# ─── Base de Datos PostgreSQL ──────────────────────────────
databases:
  - name: biblioteca-db
    databaseName: library_oxrr
    user: admin
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    postgresMajorVersion: "18"
