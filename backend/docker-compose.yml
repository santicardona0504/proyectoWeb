services:
  postgres:
    image: postgres:16
    container_name: biblioteca-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-library}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
