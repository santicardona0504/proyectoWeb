name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint-test:
    name: Backend
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://admin:admin123@localhost:5432/library_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: library_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Check Node version
        id: nvm
        run: echo "node_version=$(cat ../.nvmrc)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version-file: '../.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Syntax check
        run: find src scripts -name '*.js' -exec node --check {} +

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate
        env:
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test

      - name: Run seed
        run: npm run seed
        env:
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test
          ADMIN_PASSWORD: admin123

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test

      - name: Run audit
        run: npm audit --audit-level=high || true

  frontend-lint-build:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '../.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        if: success()
